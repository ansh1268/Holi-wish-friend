<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi ❤️</title>

<style>
body {
    margin: 0;
    padding: 0;
    font-family: Arial, sans-serif;
    text-align: center;
    overflow-x: hidden;
    background: linear-gradient(-45deg, #ff0080, #ff8c00, #40e0d0, #ffea00);
    background-size: 400% 400%;
    animation: gradientBG 8s ease infinite;
}

@keyframes gradientBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.container {
    padding: 30px;
    color: white;
}

h1 {
    font-size: 40px;
    margin-bottom: 10px;
}

.message {
    font-size: 18px;
    margin-bottom: 25px;
}

.photos {
    margin: 20px 0;
}

.img {
    width: 220px;
    border-radius: 20px;
    margin: 10px;
    box-shadow: 0 0 25px rgba(255,255,255,0.8);
    transition: 0.4s;
}

.img:hover {
    transform: scale(1.08);
}

button {
    padding: 12px 25px;
    font-size: 16px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #ff0080;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

button:hover {
    background: #ff0080;
    color: white;
}

#surpriseText {
    margin-top: 20px;
    font-size: 22px;
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1>🌸 Happy Holi 🌸</h1>

    <p class="message">
        Wishing you a colorful and joyful Holi 💖  
        May this festival bring happiness, love, and endless smiles!
    </p>

    <div class="photos">
        <!-- Yaha apni photos ka naam daalna -->
        <img src="khushi.png" class="img">
    </div>

    <button onclick="showSurprise()">Click for Surprise 🎉</button>

    <h2 id="surpriseText"></h2>
</div>

<script>
function showSurprise() {
    document.getElementById("surpriseText").innerHTML =
    "You are very special to me ❤️ Happy Holi once again!";
}
</script>

</body>
</html>
